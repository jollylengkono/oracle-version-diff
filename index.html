<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oracle Release Delta</title>
  <style>
    .theme-switcher {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 1000;
      display: flex;
      flex-direction: row;
      gap: .4rem;
    }
    .theme-btn {
      padding: .35rem .65rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: .75rem;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .15);
      transition: background .15s, border-color .15s, color .15s;
    }
    .theme-btn:hover {
      border-color: var(--border-strong);
      color: var(--ink);
      background: var(--surface-raised);
    }
    .theme-btn--active {
      border-color: var(--oracle-red);
      color: var(--oracle-red);
      background: var(--surface-raised);
    }
  </style>
  <link id="themeLink" rel="stylesheet" href="css/theme-pixel-dark.css" />
  <script>
    (function () {
      var DEFAULT_THEME = 'theme-pixel-dark';
      var THEMES = ['theme-supabase-light', 'theme-github-dark', 'theme-pixel-dark'];
      var t = localStorage.getItem('oracle-diff-theme');
      var current = THEMES.indexOf(t) !== -1 ? t : DEFAULT_THEME;
      document.getElementById('themeLink').href = 'css/' + current + '.css';
    })();
  </script>
</head>
<body>
  <header class="masthead">
    <h1 class="masthead__title">Oracle Release Delta</h1>
    <p class="masthead__subtitle">Understand what changed after your current release.</p>
  </header>

  <main class="container">
    <section class="picker">
      <label class="picker__field">Product
        <select id="product"></select>
      </label>
      <label class="picker__field">Current release
        <select id="older"></select>
      </label>
      <span class="picker__vs">to</span>
      <label class="picker__field">Target release
        <select id="newer"></select>
      </label>
    </section>

    <section class="delta-summary" aria-live="polite">
      <div id="product-icon" class="delta-summary__icon" aria-hidden="true"></div>
      <div class="delta-summary__body">
        <h2 id="delta-heading">Release delta</h2>
        <p id="delta-subheading"></p>
      </div>
    </section>

    <nav id="tabs" class="tabs" aria-label="Comparison sections"></nav>
    <div id="panels"></div>
    <p id="updated" class="updated"></p>
  </main>

  <footer class="footer">
    Release delta data sourced from Oracle-owned web properties (oracle.com).
    Oracle-inspired theme for an educational tool; not affiliated with or endorsed by Oracle.
  </footer>

  <div class="theme-switcher" id="themeSwitcher">
    <button class="theme-btn" data-theme="theme-supabase-light" title="Supabase Light">&#9728; Light</button>
    <button class="theme-btn" data-theme="theme-github-dark" title="GitHub Dark">&#9680; Dark</button>
    <button class="theme-btn" data-theme="theme-pixel-dark" title="Pixel Dark">&#9632; Pixel</button>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    (function () {
      var DEFAULT_THEME = 'theme-pixel-dark';
      var THEMES = ['theme-supabase-light', 'theme-github-dark', 'theme-pixel-dark'];
      var link = document.getElementById('themeLink');
      var stored = localStorage.getItem('oracle-diff-theme');
      var current = THEMES.indexOf(stored) !== -1 ? stored : DEFAULT_THEME;

      function apply(name) {
        link.href = 'css/' + name + '.css';
        document.querySelectorAll('.theme-btn').forEach(function (btn) {
          btn.classList.toggle('theme-btn--active', btn.dataset.theme === name);
        });
      }

      document.querySelectorAll('.theme-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          apply(btn.dataset.theme);
          localStorage.setItem('oracle-diff-theme', btn.dataset.theme);
        });
      });

      apply(current);
    })();
  </script>
</body>
</html>
